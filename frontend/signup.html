<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ErgoPilot – Create account</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="landing-body">
    <header class="landing-nav">
      <div class="landing-nav-left">
        <a href="./landing.html" class="landing-logo">ErgoPilot</a>
        <nav class="landing-nav-links"></nav>
      </div>
      <div class="landing-nav-cta">
        <a href="./signin.html" class="landing-nav-secondary">Sign in</a>
        <a href="./landing.html" class="landing-signin-btn landing-signin-btn--ghost">Back to home</a>
      </div>
    </header>

    <main class="signin-main">
      <section class="signin-card" aria-labelledby="signup-heading">
        <h1 id="signup-heading">Create account</h1>
        <p class="signin-lead">Set up your ErgoPilot account to start tracking posture risk trends.</p>

        <form id="signup-form" class="signin-form" novalidate>
          <div class="signin-field">
            <label for="signup-name">Display name</label>
            <input
              id="signup-name"
              name="display_name"
              type="text"
              autocomplete="name"
              required
              maxlength="120"
              placeholder="Jane Doe"
            />
            <p id="signup-name-error" class="signin-field-error" role="alert" hidden></p>
          </div>
          <div class="signin-field">
            <label for="signup-email">Email</label>
            <input
              id="signup-email"
              name="email"
              type="email"
              autocomplete="email"
              required
              placeholder="you@company.com"
            />
            <p id="signup-email-error" class="signin-field-error" role="alert" hidden></p>
          </div>
          <div class="signin-field">
            <label for="signup-password">Password</label>
            <input
              id="signup-password"
              name="password"
              type="password"
              autocomplete="new-password"
              required
              minlength="8"
              maxlength="256"
              placeholder="At least 8 characters"
            />
            <p id="signup-password-error" class="signin-field-error" role="alert" hidden></p>
          </div>
          <p id="signup-form-error" class="signin-banner-error" role="alert" hidden></p>
          <button type="submit" id="signup-submit" class="signin-submit">Create account</button>
        </form>

        <p class="signin-hint">
          Already have an account?
          <a id="signup-signin-link" href="./signin.html">Sign in</a>
        </p>
      </section>
    </main>

    <footer class="landing-footer">
      <p>© <span id="signup-year"></span> ErgoPilot. All rights reserved.</p>
    </footer>

    <script src="./auth.js"></script>
    <script>
      (function () {
        if (window.ErgoPilotAuth && window.ErgoPilotAuth.getAccessToken()) {
          window.location.replace("./dashboard.html");
          return;
        }

        document.getElementById("signup-year").textContent = new Date().getFullYear();

        var form = document.getElementById("signup-form");
        var nameEl = document.getElementById("signup-name");
        var emailEl = document.getElementById("signup-email");
        var passwordEl = document.getElementById("signup-password");
        var submitBtn = document.getElementById("signup-submit");
        var formError = document.getElementById("signup-form-error");
        var nameError = document.getElementById("signup-name-error");
        var emailError = document.getElementById("signup-email-error");
        var passwordError = document.getElementById("signup-password-error");
        var lockedAccountEmail = window.ErgoPilotAuth.getLockedAccountEmail();
        if (lockedAccountEmail) {
          formError.textContent =
            "This browser is locked to " +
            lockedAccountEmail +
            ". Create/sign in with that account only.";
          formError.hidden = false;
        }

        var params = new URLSearchParams(window.location.search);
        var nextRaw = params.get("next");
        var signinLink = document.getElementById("signup-signin-link");
        if (signinLink && nextRaw) {
          signinLink.setAttribute("href", "./signin.html?next=" + encodeURIComponent(nextRaw));
        }

        function clearErrors() {
          formError.hidden = true;
          formError.textContent = "";
          nameError.hidden = true;
          nameError.textContent = "";
          emailError.hidden = true;
          emailError.textContent = "";
          passwordError.hidden = true;
          passwordError.textContent = "";
          nameEl.removeAttribute("aria-invalid");
          emailEl.removeAttribute("aria-invalid");
          passwordEl.removeAttribute("aria-invalid");
        }

        function setLoading(loading) {
          submitBtn.disabled = loading;
          submitBtn.setAttribute("aria-busy", loading ? "true" : "false");
          submitBtn.textContent = loading ? "Creating account…" : "Create account";
        }

        function validateClient() {
          clearErrors();
          var ok = true;
          var displayName = nameEl.value.trim();
          if (!displayName) {
            nameError.textContent = "Enter your display name.";
            nameError.hidden = false;
            nameEl.setAttribute("aria-invalid", "true");
            ok = false;
          }

          var email = emailEl.value.trim();
          if (!email) {
            emailError.textContent = "Enter your email.";
            emailError.hidden = false;
            emailEl.setAttribute("aria-invalid", "true");
            ok = false;
          } else if (!emailEl.validity.valid) {
            emailError.textContent = "Enter a valid email address.";
            emailError.hidden = false;
            emailEl.setAttribute("aria-invalid", "true");
            ok = false;
          } else if (window.ErgoPilotAuth.isLockedToDifferentAccount(email)) {
            var locked = window.ErgoPilotAuth.getLockedAccountEmail();
            emailError.textContent =
              "This browser is locked to " + locked + ". Use that account.";
            emailError.hidden = false;
            emailEl.setAttribute("aria-invalid", "true");
            ok = false;
          }

          var pw = passwordEl.value;
          if (!pw) {
            passwordError.textContent = "Create a password.";
            passwordError.hidden = false;
            passwordEl.setAttribute("aria-invalid", "true");
            ok = false;
          } else if (pw.length < 8) {
            passwordError.textContent = "Password must be at least 8 characters.";
            passwordError.hidden = false;
            passwordEl.setAttribute("aria-invalid", "true");
            ok = false;
          }
          return ok;
        }

        function lockAuthenticatedAccount(token) {
          var base = window.ErgoPilotAuth.getApiBaseUrl();
          return fetch(base + "/api/auth/me", {
            headers: {
              Accept: "application/json",
              Authorization: "Bearer " + token
            }
          })
            .then(function (res) {
              if (!res.ok) {
                throw new Error("Could not verify account session.");
              }
              return res.json();
            })
            .then(function (user) {
              var canonicalEmail = user && user.email ? String(user.email).trim().toLowerCase() : "";
              if (!canonicalEmail) {
                throw new Error("Could not verify account email.");
              }
              if (window.ErgoPilotAuth.isLockedToDifferentAccount(canonicalEmail)) {
                var locked = window.ErgoPilotAuth.getLockedAccountEmail();
                window.ErgoPilotAuth.clearSession();
                throw new Error(
                  "This browser is locked to " + locked + ". Create/sign in with that account only."
                );
              }
              window.ErgoPilotAuth.lockAccountEmail(canonicalEmail);
            });
        }

        function formatApiError(data) {
          if (!data || data.detail == null) {
            return "Could not create account.";
          }
          if (typeof data.detail === "string") {
            return data.detail;
          }
          if (Array.isArray(data.detail) && data.detail.length) {
            return data.detail
              .map(function (d) {
                return d.msg || "";
              })
              .filter(Boolean)
              .join(" ");
          }
          return "Could not create account.";
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          if (!validateClient()) {
            return;
          }
          clearErrors();
          setLoading(true);

          var base = window.ErgoPilotAuth.getApiBaseUrl();
          var body = JSON.stringify({
            display_name: nameEl.value.trim(),
            email: emailEl.value.trim(),
            password: passwordEl.value
          });

          fetch(base + "/api/auth/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: body
          })
            .then(function (res) {
              return res.text().then(function (text) {
                var data = {};
                if (text) {
                  try {
                    data = JSON.parse(text);
                  } catch (_) {
                    data = {};
                  }
                }
                return { ok: res.ok, data: data };
              });
            })
            .then(function (result) {
              if (!result.ok) {
                throw new Error(formatApiError(result.data));
              }
              var token = result.data && result.data.access_token;
              if (!token) {
                throw new Error("Invalid response from server.");
              }
              window.ErgoPilotAuth.setAccessToken(token);
              return lockAuthenticatedAccount(token).then(function () {
                window.location.href = window.ErgoPilotAuth.safeNextPath(nextRaw);
              });
            })
            .catch(function (err) {
              var message =
                err && err.message
                  ? err.message
                  : "Something went wrong. Check your connection and try again.";
              if (
                message === "Failed to fetch" ||
                message === "NetworkError when attempting to fetch resource."
              ) {
                message =
                  "Cannot reach the API. Start the backend (port 8000) or set window.__ERGOPILOT_API_BASE__.";
              }
              formError.textContent = message;
              formError.hidden = false;
            })
            .finally(function () {
              setLoading(false);
            });
        });
      })();
    </script>
  </body>
</html>
